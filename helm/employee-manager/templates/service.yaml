apiVersion: v1
kind: Service
metadata:
  name: {{ include "employee-manager.fullname" . }}-svc
  labels:
    {{- include "employee-manager.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
  selector:
    {{- include "employee-manager.selectorLabels" . | nindent 4 }}
